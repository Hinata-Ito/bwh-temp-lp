name: Update Note Feed

# Note RSSを取得してnote-feed.jsonを自動更新するワークフロー
# - 30分ごとにcronで実行
# - GitHub UIから手動実行可（Actions タブ → "Run workflow"）
# - スクリプト/ワークフロー自体の変更時にも実行（テスト用）

on:
  schedule:
    - cron: '*/30 * * * *'   # 毎30分（UTC基準だがcronは間隔指定なので問題なし）
  workflow_dispatch: {}       # GitHub UIから手動実行
  push:
    branches: [main]
    paths:
      - 'scripts/fetch-note-feed.js'
      - '.github/workflows/update-note-feed.yml'

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch Note RSS feeds
        run: node scripts/fetch-note-feed.js

      - name: Commit if changed
        run: |
          if git diff --quiet note-feed.json; then
            echo "No changes to note-feed.json."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add note-feed.json
          git commit -m "chore: refresh Note feed [skip ci]"
          git push
