<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THE HOLO DESK ｜ セクション</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@500;700&family=Noto+Sans+JP:wght@400;500;700&family=Cormorant+Garamond:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{--bg:#050c1a;--cyan:#06b6d4;--blue:#3b82f6;--violet:#8b5cf6;--ink:#e8f0fe;--muted:#94a3c0;
    --glass:rgba(255,255,255,.04);--glassb:rgba(59,130,246,.2);--grad:linear-gradient(120deg,var(--cyan),var(--blue),var(--violet));
    --serif:"Noto Serif JP",serif;--en:"Cormorant Garamond",serif;}
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{min-height:100%;background:var(--bg);color:var(--ink);font-family:"Noto Sans JP",sans-serif;-webkit-font-smoothing:antialiased;}
  #bg{position:fixed;inset:0;z-index:-3;background:radial-gradient(1100px 760px at 75% -8%,rgba(59,130,246,.14),transparent 60%),radial-gradient(900px 700px at 8% 110%,rgba(139,92,246,.14),transparent 60%),var(--bg);}
  #bgimg{position:fixed;inset:0;z-index:-3;background-position:center;background-size:cover;opacity:0;transition:opacity 1.2s;}
  #bgscrim{position:fixed;inset:0;z-index:-2;background:linear-gradient(180deg,rgba(5,12,26,.62),rgba(5,12,26,.88));}
  .grid{position:fixed;inset:0;z-index:-2;opacity:.22;pointer-events:none;background-image:linear-gradient(rgba(59,130,246,.12) 1px,transparent 1px),linear-gradient(90deg,rgba(59,130,246,.12) 1px,transparent 1px);background-size:46px 46px;mask-image:radial-gradient(120% 80% at 50% 26%,#000 30%,transparent 75%);-webkit-mask-image:radial-gradient(120% 80% at 50% 26%,#000 30%,transparent 75%);}
  .back{position:fixed;top:22px;left:22px;z-index:5;display:inline-flex;align-items:center;gap:8px;cursor:pointer;background:rgba(8,15,31,.7);border:1px solid var(--glassb);color:var(--ink);border-radius:99px;padding:10px 18px;font-size:13px;font-weight:700;backdrop-filter:blur(8px);transition:.18s;}
  .back:hover{border-color:var(--cyan);box-shadow:0 0 22px rgba(6,182,212,.35);}
  .sheet{max-width:840px;margin:0 auto;padding:94px 28px 84px;position:relative;z-index:1;opacity:0;transform:translateY(14px);animation:rise .8s .35s ease forwards;}
  .sheet.wide{max-width:1080px;}
  @keyframes rise{to{opacity:1;transform:none;}}
  .ey{font-family:var(--en);letter-spacing:.26em;text-transform:uppercase;font-size:14px;color:var(--cyan);}
  h1{font-family:var(--serif);font-weight:700;font-size:clamp(30px,5.5vw,50px);line-height:1.2;margin:8px 0 6px;}
  h1 .g{background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent;}
  .sub{color:var(--muted);font-size:15px;margin-bottom:30px;}
  .lead{font-size:clamp(20px,2.3vw,28px);line-height:1.95;color:#dbe6f5;max-width:880px;}
  .rule{width:64px;height:3px;background:var(--grad);border-radius:2px;margin:26px 0;}
  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:18px;margin-top:28px;}
  .card{background:var(--glass);border:1px solid var(--glassb);border-radius:14px;padding:22px 24px;backdrop-filter:blur(10px);transition:.2s;}
  .card:hover{border-color:rgba(6,182,212,.4);box-shadow:0 0 30px rgba(6,182,212,.12);transform:translateY(-3px);}
  .card h3{font-family:var(--serif);font-size:21px;color:var(--cyan);margin-bottom:8px;}
  .card p{font-size:17px;line-height:1.7;color:#c2cee2;}
  .cl{font-family:var(--en);font-size:12px;letter-spacing:.16em;color:var(--cyan);text-transform:uppercase;margin:8px 0 4px;}
  .promptbox{font-family:var(--en);font-size:16px;background:#04101c;border:1px solid rgba(6,182,212,.3);border-radius:10px;padding:11px 14px;color:#bfeefb;line-height:1.55;}
  .note{margin-top:30px;font-size:13px;color:var(--muted);border-left:3px solid var(--violet);padding-left:12px;line-height:1.8;}
  .pills{display:flex;gap:10px;flex-wrap:wrap;margin-top:22px;}
  .pill{font-size:13px;padding:8px 15px;border-radius:99px;background:rgba(6,182,212,.1);border:1px solid rgba(6,182,212,.3);color:#bfeefb;}
  /* --- 自己紹介（万年筆が名前を書く） --- */
  .sig{position:relative;display:inline-block;margin:2px 0 2px;z-index:3;}
  .sig .name{display:inline-block;white-space:nowrap;font-family:var(--serif);font-weight:700;font-size:clamp(40px,5vw,76px);line-height:1.1;letter-spacing:.05em;
    background:linear-gradient(120deg,#cdeffb,#cfe0ff,#d6c8ff);-webkit-background-clip:text;background-clip:text;color:transparent;
    clip-path:inset(0 100% 0 0);animation:writeName 1.9s .5s cubic-bezier(.55,.08,.2,1) forwards;}
  @keyframes writeName{to{clip-path:inset(0 0 0 0);}}
  .sig .ul{position:absolute;left:0;bottom:-8px;height:2px;width:100%;background:var(--grad);transform:scaleX(0);transform-origin:left;animation:drawUl 1.9s .5s cubic-bezier(.55,.08,.2,1) forwards;border-radius:2px;}
  @keyframes drawUl{to{transform:scaleX(1);}}
  .sig .pen{position:absolute;top:-42px;left:0;width:110px;pointer-events:none;z-index:4;transform:rotate(28deg);transform-origin:bottom left;
    filter:drop-shadow(0 0 12px rgba(70,160,255,.55));opacity:0;animation:movePen 1.9s .5s cubic-bezier(.55,.08,.2,1) forwards;}
  @keyframes movePen{0%{opacity:0;left:-10px;}10%{opacity:1;}100%{opacity:1;left:calc(100% - 46px);}}  /* 書き終わりに右側へ残す */
  .sig .romaji{display:block;font-family:var(--en);font-style:italic;font-size:clamp(20px,3vw,32px);color:#a7cbe8;letter-spacing:.04em;margin-top:16px;opacity:0;animation:fadeUp .8s 2.1s ease forwards;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
  .tagline{font-family:var(--serif);font-size:clamp(15px,1.8vw,19px);color:#bfd2ea;margin-top:14px;opacity:0;animation:fadeUp .8s 2.4s ease forwards;}
  .profrow{display:grid;grid-template-columns:210px 1fr;gap:32px;align-items:start;margin-top:10px;}
  .photo{width:210px;height:252px;border-radius:14px;overflow:hidden;border:1px solid var(--glassb);background:#0a1426;position:relative;box-shadow:0 0 30px rgba(6,182,212,.12);}
  .photo img{width:100%;height:100%;object-fit:cover;display:block;}
  .photo.noimg::after{content:'PHOTO';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--muted);font-family:var(--en);letter-spacing:.22em;font-size:14px;}
  .base{margin-top:22px;font-size:17px;color:var(--muted);}
  .timeline{margin-top:22px;border-left:2px solid var(--glassb);padding-left:18px;}
  .timeline div{font-size:17px;color:#c2cee2;margin:10px 0;}
  .timeline div b{font-family:var(--en);color:var(--cyan);margin-right:14px;letter-spacing:.04em;}
  .links{display:flex;gap:12px;margin-top:18px;flex-wrap:wrap;}
  .links a{font-family:var(--en);font-size:15px;letter-spacing:.05em;color:var(--cyan);text-decoration:none;border:1px solid var(--glassb);border-radius:99px;padding:7px 18px;transition:.18s;}
  .links a:hover{border-color:var(--cyan);box-shadow:0 0 18px rgba(6,182,212,.3);}
  @media(max-width:680px){.profrow{grid-template-columns:1fr;}.photo{width:100%;height:300px;}}
  /* 自己紹介：エディトリアル縦型 */
  .g-hero{display:grid;grid-template-columns:auto 400px;gap:54px;justify-content:center;align-items:center;margin:6px 0 4px;}
  .g-photo{position:relative;}
  .g-photo img{width:100%;border-radius:16px;display:block;box-shadow:0 26px 60px rgba(0,0,0,.5);border:1px solid var(--glassb);}
  .g-photo::after{content:"";position:absolute;inset:0;border-radius:16px;box-shadow:inset 0 -70px 60px -34px rgba(5,12,26,.72);pointer-events:none;}
  .roles{list-style:none;margin:26px 0 0;padding:0;}
  .roles li{position:relative;padding-left:22px;font-size:clamp(17px,1.9vw,22px);line-height:1.95;color:#dbe6f5;}
  .roles li::before{content:"";position:absolute;left:0;top:.82em;width:9px;height:9px;border-radius:2px;background:var(--grad);}
  .eyebrow-en{font-family:var(--en);font-size:clamp(18px,2vw,24px);letter-spacing:.24em;color:var(--cyan);text-transform:uppercase;margin-bottom:16px;}
  .g-block{margin-top:46px;border-top:1px solid var(--glassb);padding-top:40px;}
  .svc{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px;margin-top:26px;}
  .svc .it{background:var(--glass);border:1px solid var(--glassb);border-radius:12px;padding:18px 20px;}
  .svc .it h3{font-family:var(--serif);font-size:23px;color:var(--cyan);margin-bottom:7px;}
  .svc .it p{font-size:14px;line-height:1.6;color:#aebccf;}
  .cases{display:flex;gap:14px;flex-wrap:wrap;margin-top:16px;}
  .cases span{font-size:17px;color:#dbe6f5;border:1px solid var(--glassb);border-radius:10px;padding:12px 18px;background:rgba(255,255,255,.03);}
  .callbox{margin:22px 0 6px;text-align:center;background:linear-gradient(90deg,rgba(6,182,212,.1),rgba(139,92,246,.1));border:1px solid var(--glassb);border-radius:16px;padding:26px 30px;}
  .callbox-ey{font-family:var(--en);letter-spacing:.2em;text-transform:uppercase;font-size:12px;color:var(--cyan);margin-bottom:12px;}
  .callbox-t{font-family:var(--serif);font-weight:700;font-size:clamp(18px,2.1vw,26px);line-height:1.85;color:#eaf3ff;} .callbox-t b{background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent;}
  .define{margin-top:18px;font-size:clamp(15px,1.5vw,18px);line-height:1.85;color:#aebccf;border-left:3px solid var(--cyan);padding-left:16px;max-width:880px;}
  .define b{color:#dbe6f5;} .define .dim{color:#7f93a9;}
  /* 連鎖ステップ（AI導入がもたらすこと） */
  .chain{margin-top:32px;}
  .chain .step{position:relative;display:grid;grid-template-columns:54px 1fr;gap:22px;padding-bottom:32px;}
  .chain .step:last-child{padding-bottom:0;}
  .chain .step::before{content:"";position:absolute;left:26px;top:58px;bottom:-2px;width:2px;background:linear-gradient(var(--cyan),var(--violet));opacity:.45;}
  .chain .step:last-child::before{display:none;}
  .chain .num{width:54px;height:54px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--en);font-size:26px;color:#eaf7ff;background:linear-gradient(135deg,var(--blue),var(--violet));box-shadow:0 0 24px rgba(59,130,246,.45);}
  .chain .body{padding-top:5px;}
  .chain h3{font-family:var(--serif);font-weight:700;font-size:clamp(20px,2.2vw,26px);color:var(--ink);margin-bottom:7px;}
  .chain p{font-size:clamp(16px,1.7vw,20px);line-height:1.85;color:#c2cee2;}
  .chain p b{color:#eaf3ff;}
  .closing{margin-top:34px;text-align:center;font-family:var(--serif);font-weight:700;font-size:clamp(19px,2.6vw,30px);line-height:1.6;color:#dbe6f5;}
  .closing .g{background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent;}
  /* ③ AIの右腕：LP風（p07ヒーロー＋4本柱） */
  .lp-hero{position:relative;max-width:1040px;margin:0 auto 30px;border-radius:16px;overflow:hidden;border:1px solid var(--glassb);box-shadow:0 26px 64px rgba(0,0,0,.55),0 0 46px rgba(6,182,212,.14);}
  .lp-hero img{display:block;width:100%;aspect-ratio:16/9;object-fit:cover;}
  .lp-tag{max-width:1000px;margin:0 auto;text-align:center;font-family:var(--serif);font-weight:700;font-size:clamp(18px,2.2vw,26px);line-height:1.72;color:#eaf3ff;background:linear-gradient(90deg,rgba(6,182,212,.10),rgba(139,92,246,.10));border:1px solid var(--glassb);border-radius:14px;padding:20px 26px;}
  .lp-tag b{background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent;}
  .lp-rows{display:flex;flex-direction:column;gap:18px;margin-top:26px;}
  .lp-row{display:grid;grid-template-columns:118px 1fr;gap:28px;align-items:center;background:var(--glass);border:1px solid var(--glassb);border-radius:16px;padding:26px 30px;backdrop-filter:blur(10px);transition:.2s;}
  .lp-row:hover{border-color:rgba(6,182,212,.4);box-shadow:0 0 34px rgba(6,182,212,.12);transform:translateY(-2px);}
  .lp-ic{width:118px;height:118px;border-radius:18px;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle at 50% 38%,rgba(59,130,246,.2),rgba(8,15,31,.35));border:1px solid var(--glassb);}
  .lp-ic svg{width:64px;height:64px;}
  .lp-h{display:flex;align-items:center;gap:14px;}
  .lp-h .no{flex:none;display:inline-flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:50%;font-family:var(--en);font-size:21px;color:#eaf7ff;background:linear-gradient(135deg,var(--blue),var(--violet));box-shadow:0 0 18px rgba(59,130,246,.4);}
  .lp-h h3{font-family:var(--serif);font-weight:700;font-size:clamp(21px,2.4vw,27px);color:#eaf3ff;}
  .lp-sub{margin-top:7px;font-family:var(--serif);font-size:clamp(15px,1.7vw,18px);color:var(--cyan);}
  .lp-row p{margin-top:9px;font-size:15.5px;line-height:1.8;color:#c2cee2;max-width:760px;}
  .lp-map{margin-top:11px;display:inline-block;font-size:12px;color:#9fb6d4;border:1px solid var(--glassb);border-radius:99px;padding:4px 13px;}
  @media(max-width:640px){.lp-row{grid-template-columns:1fr;}.lp-ic{width:88px;height:88px;}.lp-ic svg{width:50px;height:50px;}}
  .lp-more{margin-top:24px;text-align:center;font-size:14px;color:var(--muted);}
  .lp-more b{color:#bfeefb;}
  /* 工事中プレースホルダ（gate） */
  .wip{max-width:720px;margin:40px auto;text-align:center;padding:56px 34px;border:1px dashed rgba(148,163,192,.4);border-radius:18px;background:rgba(148,163,192,.04);}
  .wip-badge{display:inline-block;font-family:var(--en);letter-spacing:.22em;text-transform:uppercase;font-size:14px;color:#9fb2cc;border:1px solid rgba(148,163,192,.45);border-radius:99px;padding:7px 20px;margin-bottom:22px;}
  .wip-h{font-family:var(--serif);font-weight:700;font-size:clamp(26px,3.4vw,40px);color:#dbe6f5;margin-bottom:16px;}
  .wip p{font-size:clamp(15px,1.7vw,18px);line-height:1.9;color:#aebccf;}
  /* ===== ①イントロ「チャットの、その先へ」 ===== */
  .sheet.intro-mode{max-width:1200px;}
  .intro{position:relative;min-height:74vh;}
  .scene{display:none;} .scene.on{display:block;animation:sceneIn .7s ease both;}
  @keyframes sceneIn{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:none;}}
  .intro-nav{margin-top:34px;display:flex;align-items:center;justify-content:center;gap:14px;flex-wrap:wrap;}
  .inbtn{font-family:inherit;cursor:pointer;border-radius:99px;padding:14px 32px;font-size:15px;font-weight:700;letter-spacing:.04em;color:#fff;border:1px solid rgba(255,255,255,.14);background:linear-gradient(135deg,rgba(59,130,246,.88),rgba(139,92,246,.88));box-shadow:0 0 30px rgba(59,130,246,.35);transition:.2s;}
  .inbtn:hover{transform:translateY(-2px);box-shadow:0 0 46px rgba(59,130,246,.6);}
  .inbtn.ghost{background:rgba(8,15,31,.6);color:var(--ink);box-shadow:none;font-weight:600;}
  .inbtn.ghost:hover{border-color:var(--cyan);box-shadow:0 0 20px rgba(6,182,212,.35);}
  /* scene0 chat */
  .chat-head{text-align:center;margin-bottom:2.4vh;}
  .chat-head .ttl{font-family:var(--serif);font-weight:700;font-size:clamp(24px,3.6vw,42px);line-height:1.3;margin-top:8px;}
  .chatwin{max-width:640px;margin:0 auto;background:linear-gradient(180deg,rgba(12,21,40,.9),rgba(7,13,26,.92));border:1px solid var(--glassb);border-radius:18px;box-shadow:0 30px 70px rgba(0,0,0,.5),0 0 46px rgba(6,182,212,.1);overflow:hidden;backdrop-filter:blur(12px);}
  .chatwin .bar{display:flex;align-items:center;gap:8px;padding:13px 16px;border-bottom:1px solid rgba(59,130,246,.14);}
  .chatwin .bar i{width:11px;height:11px;border-radius:50%;background:#2a3b5c;display:block;}
  .chatwin .bar span{margin-left:8px;font-family:var(--en);letter-spacing:.16em;font-size:12px;color:var(--muted);}
  .chatbody{padding:24px 24px 28px;min-height:210px;}
  .bub{max-width:84%;padding:14px 18px;border-radius:15px;font-size:16px;line-height:1.75;margin-bottom:14px;}
  .bub.u{margin-left:auto;background:linear-gradient(135deg,rgba(59,130,246,.32),rgba(139,92,246,.28));border:1px solid rgba(120,150,255,.3);color:#eaf3ff;border-bottom-right-radius:5px;}
  .bub.a{background:rgba(255,255,255,.04);border:1px solid var(--glassb);color:#dbe6f5;border-bottom-left-radius:5px;min-height:26px;}
  .cursor{display:inline-block;width:9px;height:17px;vertical-align:-3px;background:var(--cyan);margin-left:1px;animation:blink 1s steps(1) infinite;}
  @keyframes blink{50%{opacity:0;}}
  /* scene1 stats */
  .intro-lead{text-align:center;font-family:var(--serif);font-weight:700;font-size:clamp(20px,2.6vw,31px);line-height:1.6;color:#eaf3ff;margin:1vh auto 3.4vh;max-width:940px;}
  .intro-lead b{color:#c4b5fd;}
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;max-width:1020px;margin:0 auto;}
  .stat{background:var(--glass);border:1px solid var(--glassb);border-radius:16px;padding:28px 24px;text-align:center;opacity:0;transform:translateY(16px);animation:statIn .7s ease forwards;backdrop-filter:blur(10px);}
  .stat:nth-child(1){animation-delay:.2s;} .stat:nth-child(2){animation-delay:.85s;} .stat:nth-child(3){animation-delay:1.5s;}
  @keyframes statIn{to{opacity:1;transform:none;}}
  .statnum{font-family:var(--en);font-weight:600;font-size:clamp(48px,6.4vw,80px);line-height:1;background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent;}
  .statnum span{font-size:.46em;}
  .statlb{margin-top:14px;font-size:15px;line-height:1.72;color:#dbe6f5;} .statlb b{color:#fff;}
  .statsrc{margin-top:13px;font-size:11px;color:var(--muted);letter-spacing:.02em;}
  .intro-lead2{text-align:center;font-family:var(--serif);font-weight:700;font-size:clamp(23px,3.2vw,38px);line-height:1.5;margin:4vh auto 0;color:#eaf3ff;}
  .intro-lead2 .g{background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent;}
  @media(max-width:820px){.stats{grid-template-columns:1fr;}}
  /* scene2 map */
  .maptitle{text-align:center;font-family:var(--serif);font-weight:700;font-size:clamp(22px,3.1vw,38px);line-height:1.4;color:#eaf3ff;margin-bottom:2.6vh;}
  .maptitle b{background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent;}
  .mapwrap{position:relative;width:100%;max-width:1060px;margin:0 auto;aspect-ratio:16/9.3;}
  .core{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:120px;height:120px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--en);font-weight:600;font-size:36px;color:#eaf7ff;background:radial-gradient(circle,#0b1c34,#08122a);border:1px solid rgba(6,182,212,.5);box-shadow:0 0 54px rgba(6,182,212,.4),inset 0 0 30px rgba(59,130,246,.3);z-index:2;}
  .core::after{content:"";position:absolute;inset:-14px;border-radius:50%;border:1px solid rgba(6,182,212,.28);animation:corePulse 3s ease-in-out infinite;}
  @keyframes corePulse{0%,100%{transform:scale(1);opacity:.5;}50%{transform:scale(1.14);opacity:.12;}}
  .node{position:absolute;transform:translate(-50%,-50%);width:118px;cursor:pointer;text-align:center;z-index:2;background:none;border:none;padding:0;}
  .node .orb{width:74px;height:74px;margin:0 auto;border-radius:50%;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle at 50% 36%,rgba(59,130,246,.22),rgba(8,15,31,.6));border:1px solid var(--glassb);transition:.24s;}
  .node .orb svg{width:40px;height:40px;stroke:#7fe9ff;fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round;}
  .node .lb{margin-top:10px;font-family:var(--serif);font-weight:700;font-size:16px;color:#cfe0f5;}
  .node:hover .orb,.node.sel .orb{transform:translateY(-4px) scale(1.07);border-color:var(--cyan);box-shadow:0 0 28px rgba(6,182,212,.55);}

function buildDeck(folder,N){
  const el=document.getElementById('deck'); if(!el)return;
  const pad=n=>String(n+1).padStart(2,'0'); let i=0;
  let grid='';
  for(let k=0;k<N;k++){grid+=`<button class="thumb" data-k="${k}"><span class="n">${pad(k)}</span><img src="assets/${folder}/${pad(k)}.png" alt="スライド${k+1}"></button>`;}
  el.innerHTML=`<div class="deck-viewer"><button class="deck-nav prev" aria-label="前へ">‹</button><div class="deck-stage"><img id="deckimg" src="assets/${folder}/01.png" alt="スライド1"></div><button class="deck-nav next" aria-label="次へ">›</button><div class="fs-hint">← → でめくる ・ Esc で戻る</div></div>
    <div class="deck-bar"><div class="deck-dots" id="deckdots"></div><div class="deck-counter" id="deckcount">1 / ${N}</div><button class="deck-fs" id="deckfs" aria-label="全画面表示"><svg viewBox="0 0 24 24"><path d="M4 9V4h5M20 9V4h-5M4 15v5h5M20 15v5h-5"/></svg>全画面</button></div>
    <div class="deck-overview"><div class="deck-ov-label">Overview ・ 全${N}ページ</div><div class="deck-grid" id="deckgrid">${grid}</div></div>`;
  const img=el.querySelector('#deckimg'),dots=el.querySelector('#deckdots'),count=el.querySelector('#deckcount'),stage=el.querySelector('.deck-stage'),thumbs=[...el.querySelectorAll('.thumb')];
  for(let k=0;k<N;k++){const b=document.createElement('button');b.setAttribute('aria-label',(k+1)+'枚目');b.onclick=()=>go(k);dots.appendChild(b);}
  function go(n,scroll){i=(n+N)%N;img.src='assets/'+folder+'/'+pad(i)+'.png';img.alt='スライド'+(i+1);count.textContent=(i+1)+' / '+N;
    [...dots.children].forEach((d,k)=>d.classList.toggle('on',k===i));
    thumbs.forEach((t,k)=>t.classList.toggle('on',k===i));
    if(scroll)stage.scrollIntoView({behavior:'smooth',block:'center'});}
  el.querySelector('.prev').onclick=()=>go(i-1);
  el.querySelector('.next').onclick=()=>go(i+1);
  img.onclick=()=>go(i+1);
  thumbs.forEach(t=>t.onclick=()=>go(+t.dataset.k,true));
  document.addEventListener('keydown',e=>{if(e.key==='ArrowRight')go(i+1);else if(e.key==='ArrowLeft')go(i-1);});
  /* 全画面プレゼン表示 */
  const viewer=el.querySelector('.deck-viewer'),fsBtn=el.querySelector('#deckfs'),fsLabel=fsBtn.lastChild;
  fsBtn.onclick=()=>{ if(document.fullscreenElement)document.exitFullscreen(); else (viewer.requestFullscreen?viewer.requestFullscreen():viewer.webkitRequestFullscreen&&viewer.webkitRequestFullscreen()); };
  document.addEventListener('fullscreenchange',()=>{fsLabel.textContent=document.fullscreenElement?'閉じる':'全画面';});
  go(0);
}

      <h2 class="serif">次は、<span class="reveal">あなたの会社の番。</span></h2>
      <p>この地図の“できること”を、御社の仕事に一つずつ。<br>まずは、案内人の自己紹介から。</p>
      <div class="intro-nav"><button class="inbtn ghost" data-prev>← もどる</button><button class="inbtn" id="startBtn">案内人に会う →</button></div>
    </div>
  </section>
  <div class="lightbox" id="lightbox"><button class="lbclose" aria-label="閉じる">×</button><div class="lbcontent"></div></div>`;
  const scenes=[...el.querySelectorAll('.scene')];let step=0,typed=false,typer=null;
  const SPEED=58;                       /* タイプ表示のゆっくり度（ms/文字） */
  const br=s=>s.replace(/\n/g,'<br>');
  function clearTyper(){if(typer){clearTimeout(typer);typer=null;}}
  function typeInto(node,msg,cb){let i=0;clearTyper();(function tick(){if(i<=msg.length){node.innerHTML=br(msg.slice(0,i))+'<span class="cursor"></span>';i++;typer=setTimeout(tick,SPEED);}else{node.innerHTML=br(msg);typer=null;if(cb)cb();}})();}
  const aQ=el.querySelector('#aQ'),aBub=el.querySelector('#aBub');
  function typeChat(){if(typed)return;typed=true;
    typeInto(aQ,'福井の名産品は？',()=>typer=setTimeout(()=>typeInto(aBub,
      '福井には、おいしい名産がたくさんあります。\n・越前がに … 冬の味覚の王様\n・越前おろしそば … 大根おろしでさっぱり\n・羽二重餅 … やわらかな口どけの銘菓\n・小浜のへしこ … 発酵の旨み\nどれも、地元で長く愛されてきた味です。'),520));}
  function show(n){step=Math.max(0,Math.min(scenes.length-1,n));scenes.forEach((s,i)=>s.classList.toggle('on',i===step));window.scrollTo({top:0,behavior:'smooth'});if(step===0)typeChat();}
  el.querySelectorAll('[data-next]').forEach(b=>b.onclick=()=>show(step+1));
  el.querySelectorAll('[data-prev]').forEach(b=>b.onclick=()=>show(step-1));
  const detail=el.querySelector('#ndetail'),card=detail.querySelector('.ncard'),cnt=el.querySelector('#mapcnt'),seen=new Set();
  let curAudio=null;
  function stopVoice(){try{speechSynthesis.cancel();}catch(e){}if(curAudio){try{curAudio.pause();curAudio.src='';}catch(e){}curAudio=null;}}
  /* 生成音声(mp3)を再生。無ければブラウザ音声で代替。cbで次のクリップへ */
  function playClip(src,text,lang,cb){stopVoice();const a=new Audio(src);curAudio=a;
    a.onended=()=>{if(curAudio===a)curAudio=null;cb&&cb();};
    a.onerror=()=>{try{speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(text);u.lang=lang;u.rate=1;u.onend=()=>cb&&cb();speechSynthesis.speak(u);}catch(e){cb&&cb();}};
    a.play().catch(()=>a.onerror());}
  function stopMedia(){clearTyper();stopVoice();card.querySelectorAll('iframe,video').forEach(el=>{try{el.src='about:blank';}catch(e){}});}
  const lb=el.querySelector('#lightbox'),lbc=lb.querySelector('.lbcontent');
  function closeLightbox(){lb.classList.remove('on');lbc.innerHTML='';}
  function openImage(src,cap){lbc.innerHTML=`<img src="${src}" alt=""><div class="lbcap">${cap||''}</div>`;lb.classList.add('on');}
  function openVideo(yt,cap){lbc.innerHTML=`<div class="ytwrap"><iframe src="https://www.youtube.com/embed/${yt}?autoplay=1&rel=0&modestbranding=1&playsinline=1" allow="autoplay; encrypted-media; fullscreen" allowfullscreen frameborder="0"></iframe></div><div class="lbcap">${cap||''}</div>`;lb.classList.add('on');}
  lb.querySelector('.lbclose').onclick=closeLightbox;
  lb.onclick=e=>{if(e.target===lb)closeLightbox();};
  function closeNode(){closeLightbox();detail.classList.remove('on');stopMedia();}
  function renderNode(n){
    if(n.type==='chat')return `<div class="chatwin" style="max-width:860px;margin:0 auto"><div class="bar"><i></i><i></i><i></i><span>AI Chat</span></div><div class="chatbody"><div class="bub u" id="nQ"></div><div class="bub a" id="nAns"></div></div></div>${n.note?`<div class="nc-src">${n.note}</div>`:''}`;
    if(n.type==='gallery')return `<div class="nc-lead">${n.lead}</div><div class="nc-gal">${n.tiles.map(t=>`<div class="gtile" data-img="assets/intro/draw/${t[3]}" data-cap="${t[0]}" style="background:linear-gradient(135deg,${t[1]},${t[2]})"><img src="assets/intro/draw/${t[3]}" alt="" onerror="this.remove()"><span>${t[0]}</span></div>`).join('')}</div><div class="nc-src">世界的に有名なAI生成画像（出典：Wikimedia Commons ／ PD・CC BY-SA）</div>`;
    if(n.type==='livedemo')return `<div class="nc-lead">${n.lead}</div><div class="call">${n.call}</div>`+
      (n.videos?`<div class="exlabel">こんな動画が作れます（クリックで再生）</div><div class="nc-vids">${n.videos.map(t=>`<div class="vtile" data-yt="${t.yt}"><img class="ythumb" src="https://img.youtube.com/vi/${t.yt}/hqdefault.jpg" alt="" onerror="this.remove()"><span class="play">▶</span><span class="cap">${t.c}</span></div>`).join('')}</div>`:'')+
      (n.slides?`<div class="exlabel">PPT MASTER で作ったスライドの例（クリックで拡大）</div><div class="nc-gal nc-slides">${n.slides.map(s=>`<div class="gtile gslide" data-img="${s}" data-cap="PPT MASTER で生成"><img src="${s}" alt="" onerror="this.remove()"></div>`).join('')}</div>`:'')+
      `<div class="nc-livedemo-foot"><div class="demobadge">▶ ${n.badge}</div></div>`;
    if(n.type==='videos')return `<div class="nc-lead">${n.lead}</div><div class="nc-vids">${n.tiles.map(t=>t.yt?`<div class="vtile" data-yt="${t.yt}"><img class="ythumb" src="https://img.youtube.com/vi/${t.yt}/hqdefault.jpg" alt="" onerror="this.remove()"><span class="play">▶</span><span class="cap">${t.c}</span></div>`:t.src?`<div class="vtile"><video src="${t.src}" autoplay muted loop playsinline></video><span class="cap">${t.c}</span></div>`:`<div class="vtile"><span class="play">▶</span><span class="cap">${t.c}</span></div>`).join('')}</div><div class="nc-src">※ タイルをクリックで再生（実在のAI生成動画）</div>`;
    if(n.type==='voice')return `<div class="nc-voice"><div class="wave">${'<i></i>'.repeat(9)}</div><div class="vspeak">「${n.speak}」</div><div class="vspeak" style="margin-top:14px;font-size:.86em;color:#bcd0ea">${n.speakEn}</div><div style="margin-top:26px;display:flex;gap:12px;justify-content:center;flex-wrap:wrap"><button class="inbtn ghost" id="vreJa">🔊 日本語</button><button class="inbtn ghost" id="vreEn">🔊 English</button></div><div class="nc-src">${n.lead}</div></div>`;
    if(n.type==='made')return `<div class="nc-lead">${n.lead}</div><div class="pjcards">${n.projects.map(p=>{const inner=`<h4>${p[0]}</h4><p>${p[1]}</p>`;return p[2]?`<a class="pjcard" href="${p[2]}" target="_blank" rel="noopener">${inner}<div class="lp-map" style="margin-top:12px">ひらく ↗</div></a>`:`<div class="pjcard">${inner}<div class="lp-map" style="margin-top:12px">近日公開</div></div>`;}).join('')}</div><div class="costnote">${n.cost}</div>`;
    if(n.type==='demo')return `<div class="nc-demo"><div class="nc-lead">${n.lead}</div><p class="body">${n.body}</p><div class="demobadge">▶ ${n.badge}</div></div>`;
    if(n.type==='future')return `<div class="nc-future"><div class="bgfallback"></div>${n.yt?`<div class="ytbg"><iframe src="https://www.youtube.com/embed/${n.yt}?autoplay=1&mute=1&loop=1&playlist=${n.yt}&controls=0&modestbranding=1&rel=0&playsinline=1&disablekb=1" allow="autoplay; encrypted-media" frameborder="0"></iframe></div>`:(n.vid?`<video class="bgv" autoplay muted loop playsinline><source src="${n.vid}"></video>`:'')}<div class="fov"><span class="fbadge">${n.fbadge||'この先の話'}</span><h3>${n.lead}</h3><p>${n.body}</p>${n.src?`<p style="margin-top:14px;font-size:12px;color:#c3d2e8">出典：${n.src}</p>`:''}</div></div>`;
    return '';
  }
  function openNode(k){const n=NODES[k];
    card.querySelector('.ic').innerHTML=n.svg;card.querySelector('.cat').textContent=n.cat;card.querySelector('.kk').textContent=n.k;
    const body=card.querySelector('.ncbody');body.classList.toggle('flush',n.type==='future');
    stopMedia();body.innerHTML=renderNode(n);body.scrollTop=0;detail.classList.add('on');
    if(n.type==='chat'){const q=body.querySelector('#nQ'),ans=body.querySelector('#nAns');if(q&&ans)setTimeout(()=>typeInto(q,n.q,()=>typer=setTimeout(()=>typeInto(ans,n.a),520)),300);}
    if(n.type==='voice'){
      const jaBtn=body.querySelector('#vreJa'),enBtn=body.querySelector('#vreEn');
      playClip(n.ja,n.speak,'ja-JP',()=>setTimeout(()=>playClip(n.en,n.speakEn,'en-US'),650));
      if(jaBtn)jaBtn.onclick=()=>playClip(n.ja,n.speak,'ja-JP');
      if(enBtn)enBtn.onclick=()=>playClip(n.en,n.speakEn,'en-US');}
    body.querySelectorAll('.vtile[data-yt]').forEach(v=>v.onclick=()=>openVideo(v.dataset.yt,v.querySelector('.cap')?.textContent));
    body.querySelectorAll('.gtile[data-img]').forEach(g=>g.onclick=()=>openImage(g.dataset.img,g.dataset.cap||''));
    el.querySelectorAll('.node')[k].classList.add('done');seen.add(k);cnt.textContent=seen.size+' / 8 見た';}
  el.querySelectorAll('.node').forEach(nd=>nd.onclick=()=>openNode(+nd.dataset.k));
  card.querySelector('.nclose').onclick=closeNode;
  detail.onclick=e=>{if(e.target===detail)closeNode();};
  el.querySelector('#startBtn').onclick=()=>{stopMedia();warpTo('section.html?id=guide');};
  document.addEventListener('keydown',e=>{
    if(e.key==='Escape'){if(lb.classList.contains('on'))closeLightbox();else if(detail.classList.contains('on'))closeNode();return;}
    if(detail.classList.contains('on'))return;
    if(e.key==='ArrowRight'||e.key==='PageDown')show(step+1);
    else if(e.key==='ArrowLeft'||e.key==='PageUp')show(step-1);});
  typeChat();
}

function caseCard(cid){const c=CASES[cid];
  return `<button class="gcard${c.primary?' primary':''}" data-c="${cid}" style="animation-delay:${ORDER.indexOf(cid)*-1.6}s"><div class="gthumb"><img class="gthumb-img" src="assets/case_${cid}.svg" alt="" onerror="this.remove()">${ICON[c.thumb]||''}<span class="gcat">${c.cat}</span>${c.tag?`<span class="gtag">${c.tag}</span>`:''}</div><div class="gbody"><h3>${gx(c.title)}</h3><p>${c.one}</p><span class="gcta">詳細 ▶</span></div></button>`;}

function renderCase(cid){
  const c=CASES[cid];
  if(!c){location.replace('section.html?id=theater');return;}
  sheet.classList.add('wide');
  const tools=c.tools.map(t=>`<div class="it"><h3>${t[0]}</h3><p>${t[1]}</p></div>`).join('');
  const steps=c.steps.map(s=>`<div><b>${s[0]}</b>${s[1]}</div>`).join('');
  let demoHtml='';
  if(c.demo){
    const links=(c.demo.links||[]).map(l=>`<a class="demolink" href="${l.url}" target="_blank" rel="noopener">${l.label} ↗</a>`).join('');
    const items=c.demo.items.map((it,i)=>`<div class="copyrow"><div class="cl">${it.label}</div><div class="copywrap"><div class="copybox" id="cb_${i}">${it.text}</div><button class="copybtn" data-t="cb_${i}">コピー</button></div></div>`).join('');
    demoHtml=`<div class="g-block"><div class="eyebrow-en">デモ環境（実演用）</div>${c.demo.intro?`<p class="define" style="margin-top:6px">${c.demo.intro}</p>`:''}${links?`<div class="demolinks">${links}</div>`:''}${items}</div>`;
  }
  sheet.innerHTML=`<div class="ey en">Case ・ ${c.cat}</div><h1 class="serif">${gx(c.title)}</h1><div class="sub">${c.one}</div>
    ${c.call?`<div class="callbox"><div class="callbox-ey en">Your turn ・ その場でつくります</div><div class="callbox-t">${c.call}</div></div>`:''}
    <div class="g-block" style="border:none;padding-top:18px;margin-top:18px"><div class="eyebrow-en">業務内容</div><p class="lead">${c.task}</p></div>
    <div class="ba"><div class="ba-tabs"><button class="ba-tab active" data-k="b">Before</button><button class="ba-tab" data-k="a">After（実演）</button></div>
      <div class="ba-panel before" data-k="b">${c.before}</div><div class="ba-panel after" data-k="a" hidden>${c.after}</div></div>
    ${c.learn?`<div class="g-block"><div class="eyebrow-en">${c.learn.title}</div>${c.learn.body}</div>`:''}
    <div class="g-block"><div class="eyebrow-en">使うツール</div><div class="svc">${tools}</div></div>
    <div class="g-block"><div class="eyebrow-en">手順</div><div class="timeline">${steps}</div></div>
    ${demoHtml}`;
  sheet.querySelectorAll('.ba-tab').forEach(t=>{t.onclick=()=>{
    sheet.querySelectorAll('.ba-tab').forEach(x=>x.classList.toggle('active',x===t));
    sheet.querySelectorAll('.ba-panel').forEach(p=>{p.hidden=(p.dataset.k!==t.dataset.k);});};});
  sheet.querySelectorAll('.copybtn').forEach(b=>{b.onclick=()=>{const el=document.getElementById(b.dataset.t);
    navigator.clipboard.writeText(el.textContent).then(()=>{const o=b.textContent;b.textContent='コピー✓';b.classList.add('done');
      setTimeout(()=>{b.textContent=o;b.classList.remove('done');},1400);}).catch(()=>{b.textContent='コピー失敗';});};});
}

const im=new Image();im.onload=()=>{const e=document.getElementById('bgimg');e.style.backgroundImage=`url('${bgImg}')`;e.style.opacity='1';};if(bgImg)im.src=bgImg;
function warpTo(href){const w=document.getElementById('warp');w.style.animation='none';
  w.animate([{opacity:0,transform:'scale(.2)'},{opacity:1,transform:'scale(3)'}],{duration:520,easing:'ease-in',fill:'forwards'});
  setTimeout(()=>location.href=href,480);}
document.getElementById('back').onclick=()=>{
  if(id==='case'){warpTo('section.html?id=theater');return;}
  sessionStorage.setItem('holodesk_return','1');
  const w=document.getElementById('warp');w.style.animation='none';
  w.animate([{opacity:0,transform:'scale(.2)'},{opacity:1,transform:'scale(3)'}],{duration:560,easing:'ease-in',fill:'forwards'});
  setTimeout(()=>location.href='index.html',520);};
</script>
</body>
</html>
